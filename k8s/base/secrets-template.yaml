---
# ─── Secrets Template ─────────────────────────────────────────────────────────
# DO NOT commit real values. Populate via:
#   kubectl create secret generic stock-prediction-secrets \
#     --namespace stock-prediction \
#     --from-literal=alphavantage-api-key=YOUR_KEY
#
# Or use an external secrets operator (e.g. External Secrets Operator + AWS SSM)
apiVersion: v1
kind: Secret
metadata:
  name: stock-prediction-secrets
  namespace: stock-prediction
type: Opaque
stringData:
  alphavantage-api-key: "REPLACE_ME"   # ← replace before applying

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: stock-prediction
type: Opaque
stringData:
  admin-password: "REPLACE_ME"         # ← replace before applying
